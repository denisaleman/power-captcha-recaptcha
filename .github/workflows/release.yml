name: Release

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to create GitHub releases and tags
      issues: write    # Needed to comment on issues
      pull-requests: write  # Needed to comment on pull requests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed to get all tags for semantic-release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install plugin dependencies
        run: |
          cd plugin
          npm ci

      - name: Build plugin assets
        run: |
          cd plugin
          npm run build

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
      - name: Update version files
        run: |
          chmod +x ./scripts/update-version.js
          ./scripts/update-version.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}